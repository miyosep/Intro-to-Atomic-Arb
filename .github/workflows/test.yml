name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests (skip fork tests, need MAINNET_RPC_URL for full verification)
        run: forge test --no-match-test "test_Verify|test_Task7|test_Resimulate|test_ForkAtBlock|test_TraceOriginal|test_DebugPathStepByStep|test_QuickVerify|test_DebugV2SwapParams" -vvv
